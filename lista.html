<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Panel de Administración - Boda Carmen y Joaquín</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Great+Vibes&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-script { font-family: 'Great Vibes', cursive; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen p-4 md:p-8">

    <div id="login-screen" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
        <h2 class="text-2xl font-bold text-center mb-6 text-gray-900">Panel de Invitados </h2>
        <div class="space-y-4">
            <div>
                <label class="text-xs font-bold text-gray-500 uppercase tracking-wider block mb-2">Contraseña de acceso</label>
                <input id="password-input" type="password" class="w-full h-12 px-4 rounded-xl border-gray-200 focus:ring-2 focus:ring-green-400 focus:border-green-400 border" placeholder="Introduce la clave para ver la lista">
            </div>
            <button onclick="verificarPassword()" class="w-full h-12 bg-green-500 hover:bg-green-600 text-white font-bold rounded-xl shadow-lg shadow-green-500/20 transition-all">
                Entrar al Panel
            </button>
        </div>
    </div>

    <div id="admin-panel" class="max-w-6xl mx-auto hidden space-y-6">
        
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
            <div>
                <h1 class="font-script text-5xl text-gray-900 leading-tight">Carmen y Joaquin</h1>
                <p class="text-gray-500 text-sm font-medium tracking-wide">Control de invitados en tiempo real</p>
            </div>
            <div class="flex gap-3">
                <button onclick="cargarInvitados()" class="h-11 px-5 bg-gray-100 hover:bg-gray-200 font-semibold text-sm text-gray-700 rounded-xl flex items-center gap-2 transition-all">
                    🔄 Actualizar
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">Total Adultos</p>
                <p id="stat-adultos" class="text-3xl font-bold text-gray-900 mt-1">0</p>
            </div>
            <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">Total Niños</p>
                <p id="stat-ninos" class="text-3xl font-bold text-green-600 mt-1">0</p>
            </div>
            <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">Menús de Carne</p>
                <p id="stat-carne" class="text-3xl font-bold text-orange-600 mt-1">0</p>
            </div>
            <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">Menús de Pescado</p>
                <p id="stat-pescado" class="text-3xl font-bold text-blue-600 mt-1">0</p>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-100 text-xs font-bold text-gray-400 uppercase tracking-wider">
                            <th class="py-4 px-6">Invitado Principal</th>
                            <th class="py-4 px-6">Menú 1</th>
                            <th class="py-4 px-6">Acompañante</th>
                            <th class="py-4 px-6">Menú 2</th>
                            <th class="py-4 px-6 text-center">Niños</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-cuerpo" class="divide-y divide-gray-100 text-sm text-gray-700">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

<script>
    // 
    const CLAVE_OCULTA = "Ym9kYTIwMjY=";

    let supabaseClient = null;

    function verificarPassword() {
        const input = document.getElementById('password-input').value;
        
        // Convertimos lo que escribe el usuario al mismo formato oculto
        const inputCodificado = btoa(input);

        if (inputCodificado === CLAVE_OCULTA) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
            
            // Las credenciales solo se crean en la memoria del navegador tras acertar la clave
            const u = "https://" + "awmpaldghsbweifiaudc" + ".supabase.co";
            const k = "sb_publishable_" + "O-MKgu_IQ68BEftpLKPKfQ_yu_hiAnN";
            supabaseClient = supabase.createClient(u, k);

            cargarInvitados();
        } else {
            alert("Contraseña incorrecta ❌");
        }
    }

    async function cargarInvitados() {
        if (!supabaseClient) return;

        const cuerpo = document.getElementById('tabla-cuerpo');
        cuerpo.innerHTML = `<tr><td colspan="5" class="text-center py-8 text-gray-400 animate-pulse">Cargando invitados...</td></tr>`;

        const { data, error } = await supabaseClient
            .from('asistencias')
            .select('*')
            .order('id', { ascending: false });

        if (error) {
            alert("Error al cargar datos: " + error.message);
            return;
        }

        cuerpo.innerHTML = "";
        
        let totalAdultos = 0;
        let totalNinos = 0;
        let totalCarne = 0;
        let totalPescado = 0;

        if(data.length === 0) {
            cuerpo.innerHTML = `<tr><td colspan="5" class="text-center py-8 text-gray-400">Aún no hay confirmaciones.</td></tr>`;
            return;
        }

        data.forEach(item => {
            totalAdultos += 1; 
            if (item.acompanante && item.acompanante !== 'Ninguno' && item.acompanante.trim() !== '') {
                totalAdultos += 1;
            }

            totalNinos += parseInt(item.ninos || 0);

            if (item.menu_principal === 'Carne') totalCarne++;
            if (item.menu_principal === 'Pescado') totalPescado++;
            if (item.acompanante && item.acompanante !== 'Ninguno' && item.acompanante.trim() !== '') {
                if (item.menu_acompanante === 'Carne') totalCarne++;
                if (item.menu_acompanante === 'Pescado') totalPescado++;
            }

            const fila = document.createElement('tr');
            fila.className = "hover:bg-gray-50/50 transition-colors";
            fila.innerHTML = `
                <td class="py-4 px-6 font-semibold text-gray-900">${item.invitado_principal}</td>
                <td class="py-4 px-6">
                    <span class="px-2.5 py-1 rounded-lg text-xs font-bold ${item.menu_principal === 'Carne' ? 'bg-orange-50 text-orange-700' : 'bg-blue-50 text-blue-700'}">${item.menu_principal}</span>
                </td>
                <td class="py-4 px-6 text-gray-500">${item.acompanante}</td>
                <td class="py-4 px-6">
                    ${(item.acompanante && item.acompanante !== 'Ninguno' && item.acompanante.trim() !== '') ? `<span class="px-2.5 py-1 rounded-lg text-xs font-bold ${item.menu_acompanante === 'Carne' ? 'bg-orange-50 text-orange-700' : 'bg-blue-50 text-blue-700'}">${item.menu_acompanante}</span>` : '<span class="text-gray-300">-</span>'}
                </td>
                <td class="py-4 px-6 text-center font-bold text-gray-900">${item.ninos}</td>
            `;
            cuerpo.appendChild(fila);
        });

        document.getElementById('stat-adultos').innerText = totalAdultos;
        document.getElementById('stat-ninos').innerText = totalNinos;
        document.getElementById('stat-carne').innerText = totalCarne;
        document.getElementById('stat-pescado').innerText = totalPescado;
    }
</script>
</body>
</html>
